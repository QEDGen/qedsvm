# ---------------------------------------------------------------- idioms (v0.2+)
# Lever 4 from issue #11. Once the recogniser ships, each entry tags
# a block-start PC with a canonical pattern; the Lean proof applies
# the corresponding domain lemma in one `apply`.
# Empty in v0.1.
# [[instruction.idiom]]
# block_start = 5048
# pattern     = "lamports_add"
# bindings    = { dst_reg = "r3", src_reg = "r2", offset = 0xa0 }

# ---------------------------------------------------------------- tags (v0.2+)
# Happy/sad-path classification. Needs a mollusk execution trace.
# Empty in v0.1.
# [[instruction.tag]]
# block_start = 5048
# role        = "happy"
# source      = "mollusk-trace#a3f1c"

# ---------------------------------------------------------------- proof binding
# Links the claim above to a specific theorem in the Lean proof
# library. The verifier type-checks that this theorem proves the
# claim about the binary at the recovered PCs.
[instruction.proofs]
spec_module       = "PToken.TransferArm.FullHappyPath"
spec_theorem      = "p_token_transfer_full_happy_path_terminates"
spec_sha256       = "PLACEHOLDER_RECOMPUTE_FROM_FullHappyPath.lean"
refinement_module = "PToken.MirRefines"
refinement_lemma  = "MinimalTransferAsm_refines_tokenTransfer"
