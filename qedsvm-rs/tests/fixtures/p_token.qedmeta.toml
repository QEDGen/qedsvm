# qedsvm sidecar metadata for pinocchio p_token.
#
# In the canonical production path, this file is emitted at compile
# time by qedgen from source-level annotations (analogous to how
# Anchor/Codama emit IDL). The values here would be exact PCs from
# the linker, derived from a build that knows which functions implement
# which MIR intrinsics.
#
# For this fixture (pinocchio is third-party and has no qedgen
# annotations), the same file shape is produced by qedrecover scanning
# the .so + IDL + overlay. The verifier doesn't care which path produced
# the sidecar; it consumes the same TOML.
#
# Hash-pinned to a specific deployed .so. Lives off-chain. NEVER
# embedded in the deployed binary — on-chain bytes are byte-identical
# to a build that knows nothing about qedsvm.
#
# Schema: see qedsvm-rs/spec/qedmeta.md.

schema_version = 2
spec_version   = "qedmeta/0.2"

# ---------------------------------------------------------------- target
# Binds this sidecar to one specific deployed .so. Verifier fails fast
# if SHA-256 of the .so doesn't match.
[target]
sha256       = "PLACEHOLDER_RECOMPUTE_FROM_p_token.so"
program_name = "p-token"
program_id   = "P1tokenProgram111111111111111111111111111111"
source       = "github.com/anza-xyz/p-token@v1.0.0-rc.1"
toolchain    = "solana-platform-tools-v1.41 + rustc 1.79.0"

# ---------------------------------------------------------------- IDL
# Hash-pin the IDL the metadata was produced against. `inline = false`
# references an external file kept side-by-side; `inline = true`
# embeds the IDL bytes here (preferred for frozen ship artifacts).
[idl]
format = "codama"
inline = false
ref    = "spl_token.codama.json"
sha256 = "PLACEHOLDER_RECOMPUTE_FROM_spl_token.codama.json"

# ---------------------------------------------------------------- instruction: transfer
# One [[instruction]] table per claim the project makes about a
# specific entry point. Instructions not listed here are silently
# out of scope for verification.

[[instruction]]
name      = "transfer"
refines   = "Mir.tokenTransfer"
cu_budget = 76

[instruction.discriminator]
value       = 3
width_bytes = 1
format      = "u8"

# Account layout, instruction-order, mirrors the IDL verbatim so the
# verifier can cross-check without re-reading it.
[[instruction.account]]
name     = "source"
writable = true
signer   = false
[[instruction.account]]
name     = "destination"
writable = true
signer   = false
[[instruction.account]]
name     = "authority"
writable = false
signer   = "either"           # Codama term for "signer-or-multisig"

# ---------------------------------------------------------------- recovered facts
# In the qedgen path these are EXACT compiler-known PCs. In the
# qedrecover fallback these are PATTERN-MATCHED PCs from scanning the
# bytecode. Either way they're frozen at sidecar-emit time; the
# verifier doesn't re-derive them.
#
# All PCs below are LOGICAL (decoded-array index, lddw = one entry —
# the numbering Lean decode, qedlift, and .pcs traces use). The
# spike-era values here (arm_entry 309, 59 blocks) were produced by a
# slot/logical space-mixing bug in qedrecover's dispatcher recovery,
# fixed 2026-06-10; see the `transfer_arm_entry_spaces` pin test.
[instruction.recovered]
dispatch_load_pc    = 198
dispatch_jeq_pc     = 199
arm_entry_pc        = 304
enclosing_func_pc   = 225
block_count         = 1940
total_instructions  = 6498

# CFG slice from arm_entry, bounded to the enclosing function.
# Format per row: [start_pc, end_pc_exclusive, [destination_pcs...]]
# Long but inspectable; consider gzip-encoding if the size becomes
# painful for larger programs.
blocks = [
  # Elided in this fixture: the correctly-rooted transfer slice is
  # 1940 blocks (pinocchio inlines the whole program into one
  # function). Regenerate with:
  #   cargo run -p qedrecover -- \
  #     --so tests/fixtures/p_token.so \
  #     --overlay tests/fixtures/p_token.qedoverlay.toml \
  #     --trace tests/fixtures/p_token_transfer.pcs
]

# ---------------------------------------------------------------- idioms (v0.2+)
# Lever 4 from issue #11. The recogniser SHIPPED (qedrecover
# src/bin/qedrecover/idioms.rs): starter vocabulary
# {u64_field_increment, u64_field_decrement, error_propagation_check,
# read_discriminator}, emitted as `idioms` in the recovered Lean
# metadata. Real example from this binary (the transfer debit/credit
# pair, recognised at logical 4673/4676):
# [[instruction.idiom]]
# pc      = 4673
# pattern = "u64_field_decrement"
# bindings = { base = "r5", off = 72, amount = "r8" }
# Promotion of the recognised tags into this sidecar (same channel as
# the trace tags above) is the remaining v0.2 step.

# ---------------------------------------------------------------- tags (v0.2+)
# Happy/sad-path classification from an execution trace. Produced
# end-to-end today by `scripts/capture_trace.sh` (Lean reference VM,
# QEDSVM_TRACE_OUT hook) + `qedrecover --trace <pcs>`: on-trace blocks
# are emitted as `happyPathBlocks` in the recovered Lean metadata.
# Example shape once promoted into the sidecar itself:
# [[instruction.tag]]
# block_start = 304
# role        = "happy"
# source      = "p_token_transfer.pcs"

# ---------------------------------------------------------------- proof binding
# Links the claim above to a specific theorem in the Lean proof
# library. The verifier type-checks that this theorem proves the
# claim about the binary at the recovered PCs.
[instruction.proofs]
spec_module       = "PToken.TransferArm.FullHappyPath"
spec_theorem      = "p_token_transfer_full_happy_path_terminates"
spec_sha256       = "PLACEHOLDER_RECOMPUTE_FROM_FullHappyPath.lean"
refinement_module = "PToken.MirRefines"
refinement_lemma  = "MinimalTransferAsm_refines_tokenTransfer"
