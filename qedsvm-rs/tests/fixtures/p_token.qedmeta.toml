# qedsvm sidecar metadata for pinocchio p_token.
#
# In the canonical production path, this file is emitted at compile
# time by qedgen from source-level annotations (analogous to how
# Anchor/Codama emit IDL). The values here would be exact PCs from
# the linker, derived from a build that knows which functions implement
# which MIR intrinsics.
#
# For this fixture (pinocchio is third-party and has no qedgen
# annotations), the same file shape is produced by qedrecover scanning
# the .so + IDL + overlay. The verifier doesn't care which path produced
# the sidecar; it consumes the same TOML.
#
# Hash-pinned to a specific deployed .so. Lives off-chain. NEVER
# embedded in the deployed binary — on-chain bytes are byte-identical
# to a build that knows nothing about qedsvm.
#
# Schema: see qedsvm-rs/spec/qedmeta.md.

schema_version = 1
spec_version   = "qedmeta/0.1"

# ---------------------------------------------------------------- target
# Binds this sidecar to one specific deployed .so. Verifier fails fast
# if SHA-256 of the .so doesn't match.
[target]
sha256       = "PLACEHOLDER_RECOMPUTE_FROM_p_token.so"
program_name = "p-token"
program_id   = "P1tokenProgram111111111111111111111111111111"
source       = "github.com/anza-xyz/p-token@v1.0.0-rc.1"
toolchain    = "solana-platform-tools-v1.41 + rustc 1.79.0"

# ---------------------------------------------------------------- IDL
# Hash-pin the IDL the metadata was produced against. `inline = false`
# references an external file kept side-by-side; `inline = true`
# embeds the IDL bytes here (preferred for frozen ship artifacts).
[idl]
format = "codama"
inline = false
ref    = "spl_token.codama.json"
sha256 = "PLACEHOLDER_RECOMPUTE_FROM_spl_token.codama.json"

# ---------------------------------------------------------------- instruction: transfer
# One [[instruction]] table per claim the project makes about a
# specific entry point. Instructions not listed here are silently
# out of scope for verification.

[[instruction]]
name      = "transfer"
refines   = "Mir.tokenTransfer"
cu_budget = 76

[instruction.discriminator]
value       = 3
width_bytes = 1
format      = "u8"

# Account layout, instruction-order, mirrors the IDL verbatim so the
# verifier can cross-check without re-reading it.
[[instruction.account]]
name     = "source"
writable = true
signer   = false
[[instruction.account]]
name     = "destination"
writable = true
signer   = false
[[instruction.account]]
name     = "authority"
writable = false
signer   = "either"           # Codama term for "signer-or-multisig"

# ---------------------------------------------------------------- recovered facts
# In the qedgen path these are EXACT compiler-known PCs. In the
# qedrecover fallback these are PATTERN-MATCHED PCs from scanning the
# bytecode. Either way they're frozen at sidecar-emit time; the
# verifier doesn't re-derive them.
#
# PCs are in solana-sbpf analysis space (instruction-slot indices,
# not byte offsets — `lddw` occupies 16 bytes but 1 slot).

[instruction.recovered]
dispatch_load_pc    = 198
dispatch_jeq_pc     = 199
arm_entry_pc        = 309
enclosing_func_pc   = 282
block_count         = 59
total_instructions  = 151

