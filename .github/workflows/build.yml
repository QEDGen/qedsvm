name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lake-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: lean --version

      - name: lake build (core SVM library)
        run: |
          set -o pipefail
          lake build 2>&1 | tee build-core.log

      - name: lake build Examples (flagship proofs + axiom-audit gate)
        # AxiomAudit.lean is the first root of the Examples target: it fails
        # the build if any flagship theorem depends on a non-standard axiom
        # (sorry / native_decide / crypto). See examples/lean/AxiomAudit.lean.
        run: |
          set -o pipefail
          lake build Examples 2>&1 | tee build-examples.log

      - name: Verify no `sorry` reached the kernel
        # Lean emits "declaration uses 'sorry'" for any declaration that
        # elaborated a sorry. Grepping the build log (not the source) avoids
        # false positives from the word "sorry" appearing in comments.
        run: |
          if grep -F "declaration uses 'sorry'" build-core.log build-examples.log; then
            echo "Found a declaration that uses sorry — qedsvm does not ship sorries."
            exit 1
          fi

      - name: Verify zero axiom declarations outside CryptoTrust.lean
        # The only sanctioned axioms are the crypto shape axioms in
        # SVM/SBPF/CryptoTrust.lean. Any new `axiom` elsewhere in SVM/ is a
        # TCB regression and must be reviewed deliberately.
        run: |
          UNEXPECTED=$(grep -rln '^axiom' SVM/ | grep -v 'SVM/SBPF/CryptoTrust.lean' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "Unexpected axioms outside CryptoTrust.lean:"
            echo "$UNEXPECTED"
            exit 1
          fi

      - name: Differential conformance vs mollusk/agave
        # Empirical soundness backstop: runs the compiled Lean interpreter
        # against mollusk on the fixture corpus. Reuses the Lean artifact
        # `lake build` just produced (avoids the stale-dylib skew).
        working-directory: qedsvm-rs
        run: cargo test --features diff-mollusk

      - name: qedlift emitter pins
        # Re-runs the qedlift emitter on every shipped lift/refinement
        # fixture and byte-diffs the on-disk artifacts. The H8
        # overlap-vacuity findings shipped unnoticed precisely because
        # the p_token arms had no emitter pins — these must stay in CI.
        working-directory: qedsvm-rs
        run: cargo test --features qedrecover --bin qedlift
