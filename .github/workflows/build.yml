name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Jobs, split by what each needs:
#   rust     — standalone Lean-free crates; no toolchain, seconds to run.
#   core     — the core `lake build`, once; caches `.lake` for the two jobs
#              below (keyed on the run SHA so they restore this exact build).
#   lean     — restores core's `.lake`, then the checks that link the Lean
#              runtime (diff-mollusk, qedlift pins) + the soundness gates.
#   examples — restores core's `.lake`, then the flagship proofs (the long
#              pole) + axiom-audit gate.
# `lean`/`examples` no longer rebuild the core library: `needs: core` runs
# them after core has populated the cache. The SHA-keyed cache is the shared
# artifact; the restore-keys give core a cross-run incremental build too.
# The key's hashFiles(...) is evaluated per-step after checkout (it would be
# empty in a workflow-level env, before the files exist), and is identical
# across jobs since they check out the same commit.

jobs:
  # Keep the flagship proof build off Rust-only pull requests. Pushes to main
  # always run it; on PRs this filter captures every input that can affect the
  # Lean examples or their native bridge.
  changes:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.paths.outputs.examples }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            examples:
              - 'SVM/**'
              - 'examples/**'
              - 'lakefile.lean'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'qedsvm-rs/Cargo.toml'
              - 'qedsvm-rs/Cargo.lock'
              - 'qedsvm-rs/lean-bridge/**'

  # Standalone Lean-free lifting-frontend crates: dispatcher recognition,
  # slot<->logical PC map, IDL account layout, PC symbolication, lift coverage.
  # No Lean toolchain, no lake — the fastest signal.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qedsvm-rs

      - name: Rust formatting
        working-directory: qedsvm-rs
        run: cargo fmt --all -- --check

      - name: Strict Lean-free Clippy
        working-directory: qedsvm-rs
        run: cargo clippy -p qedrecover -p qed-analysis --all-targets -- -D warnings

      - name: qedrecover + qed-analysis crate tests
        working-directory: qedsvm-rs
        run: cargo test -p qedrecover -p qed-analysis

  # Build the core SVM library ONCE and cache `.lake` for `lean` + `examples`.
  # Also carries the core soundness gates (no-sorry over the authoritative core
  # build log; no-axiom source check).
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: lean --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qedsvm-rs

      - name: Cache .lake (core build, shared with lean + examples)
        uses: actions/cache@v4
        with:
          path: .lake
          # SHA in the key => lean/examples restore THIS run's build exactly.
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-${{ github.sha }}
          # Fall back to the latest prior build for a cross-run incremental core.
          restore-keys: |
            lake-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-

      - name: lake build (core SVM library)
        run: |
          set -o pipefail
          lake build 2>&1 | tee build-core.log

      - name: Verify no `sorry` reached the kernel (core)
        # Lean emits "declaration uses 'sorry'" for any declaration that
        # elaborated a sorry. Grep the build log (not the source) to avoid
        # false positives from the word "sorry" in comments.
        run: |
          if grep -F "declaration uses 'sorry'" build-core.log; then
            echo "Found a declaration that uses sorry — qedsvm does not ship sorries."
            exit 1
          fi

      - name: Verify zero axiom declarations outside CryptoTrust.lean
        # The only sanctioned axioms are the crypto shape axioms in
        # SVM/SBPF/CryptoTrust.lean. Any new `axiom` elsewhere in SVM/ is a
        # TCB regression and must be reviewed deliberately.
        run: |
          UNEXPECTED=$(grep -rln '^axiom' SVM/ | grep -v 'SVM/SBPF/CryptoTrust.lean' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "Unexpected axioms outside CryptoTrust.lean:"
            echo "$UNEXPECTED"
            exit 1
          fi

  # The Rust checks that link the Lean runtime: diff-mollusk runs the compiled
  # Lean interpreter, and the qedlift bin links the qedsvm crate's Lean bridge.
  # Reuses core's `.lake` (restored below); the `lake build` is a no-op that
  # only completes the build if the restore was somehow incomplete.
  lean:
    needs: core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: lean --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qedsvm-rs

      - name: Restore .lake (core build)
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            lake-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-

      - name: lake build (no-op after restore)
        run: |
          set -o pipefail
          lake build 2>&1 | tee build-core.log

      - name: Strict core Rust Clippy
        working-directory: qedsvm-rs
        run: cargo clippy --lib --bins -- -D warnings

      - name: Default workspace tests
        working-directory: qedsvm-rs
        run: cargo test --workspace

      - name: Lean runner integration tests
        # RunnerTests is intentionally not imported by the production SVM
        # aggregator; build its exact native_decide assertions explicitly.
        run: lake build SVM.SBPF.RunnerTests

      - name: Differential conformance vs mollusk/agave
        # Empirical soundness backstop: runs the compiled Lean interpreter
        # against mollusk on the fixture corpus, linking the restored Lean lib.
        working-directory: qedsvm-rs
        run: cargo test --features diff-mollusk

      - name: qedlift emitter pins
        # Re-runs the qedlift emitter on every shipped lift/refinement fixture
        # and byte-diffs the on-disk artifacts. The H8 overlap-vacuity findings
        # shipped unnoticed precisely because the p_token arms had no emitter
        # pins — these must stay in CI.
        working-directory: qedsvm-rs
        run: cargo test --features qedrecover --bin qedlift

  # Flagship proofs demonstrating the verification chain + the axiom-audit gate.
  # AxiomAudit.lean is the first Examples root and fails the build on any
  # non-standard axiom (sorry / native_decide / crypto). The long pole; builds
  # only the Examples layer on top of core's restored `.lake`.
  examples:
    needs: [core, changes]
    if: github.event_name == 'push' || needs.changes.outputs.examples == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: lean --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: qedsvm-rs

      - name: Restore .lake (core build)
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            lake-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-

      - name: lake build (no-op after restore — completes core if incomplete)
        run: |
          set -o pipefail
          lake build 2>&1 | tee build-core.log

      - name: lake build Examples (flagship proofs + axiom-audit gate)
        run: |
          set -o pipefail
          lake build Examples 2>&1 | tee build-examples.log
          lake build ExamplesCpi 2>&1 | tee build-examples-cpi.log

      - name: Verify no `sorry` reached the kernel (examples)
        # Core-module sorries are gated in the `core` job; here we check the
        # Examples build logs.
        run: |
          if grep -F "declaration uses 'sorry'" build-examples.log build-examples-cpi.log; then
            echo "Found a declaration that uses sorry — qedsvm does not ship sorries."
            exit 1
          fi
