name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lake-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: lean --version

      - name: lake build
        run: lake build

      - name: Verify zero axioms outside Account.lean
        run: |
          set -e
          UNEXPECTED=$(grep -rln '^axiom' Svm/ | grep -v 'Account.lean' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "Unexpected axioms outside Account.lean:"
            echo "$UNEXPECTED"
            exit 1
          fi

      - name: Verify zero sorry
        run: |
          set -e
          if grep -rn '\bsorry\b' Svm/; then
            echo "Found sorry — formal-svm does not ship sorries."
            exit 1
          fi
